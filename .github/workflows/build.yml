name: "Build FaceFusion4.8 DMG"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-dmg:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Free disk space
        run: |
          echo "=== 清理前 ===" && df -h /
          # 删除 Xcode 释放 ~5GB，给稀疏镜像腾空间
          sudo rm -rf /Applications/Xcode*.app 2>/dev/null || true
          # 清理 Runner 工具集
          rm -rf /opt/hostedtoolcache 2>/dev/null || true
          rm -rf /Users/runner/.dotnet 2>/dev/null || true
          rm -rf /Users/runner/.cargo 2>/dev/null || true
          rm -rf /usr/local/.ghcup 2>/dev/null || true
          rm -rf /usr/local/lib/android 2>/dev/null || true
          rm -rf "$(brew --cache)" 2>/dev/null || true
          echo "=== 清理后 ===" && df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg/curl/tkinter
        run: |
          brew install python-tk@3.12 2>/dev/null || true
          echo "  ffmpeg: $(which ffmpeg) → $(ffmpeg -version 2>&1 | head -1 || echo 'built-in')"
          echo "  curl:   $(which curl) → $(curl --version 2>&1 | head -1)"

      - name: Cache FaceFusion models
        uses: actions/cache@v4
        with:
          path: facefusion-master/.assets
          key: facefusion-models-3.6.1-v3
          restore-keys: |
            facefusion-models-3.6.1-

      - name: Build DMG
        run: |
          chmod +x launcher/build.sh
          bash launcher/build.sh
        env:
          SETUP_PYTHON_PATH: ${{ env.pythonLocation }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: FaceFusion4.8-macOS-arm64
          path: build/FaceFusion4.8-macOS-arm64.*
          retention-days: 30

      - name: Upload to Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          RELEASE_FILE="$(ls build/FaceFusion4.8-macOS-arm64.* 2>/dev/null | head -1)"
          gh release create "$GITHUB_REF_NAME" \
            "$RELEASE_FILE" \
            --title "FaceFusion4.8 黄金定制版 $GITHUB_REF_NAME" \
            --notes "FaceFusion4.8 黄金定制版 macOS DMG 整合包"
        env:
          GH_TOKEN: ${{ github.token }}
