name: "Build FaceFusion4.8 DMG"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-dmg:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Homebrew
        run: |
          brew install create-dmg ffmpeg curl 2>/dev/null || true

      - name: Cache Python standalone
        uses: actions/cache@v4
        with:
          path: /tmp/python-standalone
          key: python-standalone-3.12.11-arm64

      - name: Cache FaceFusion models
        uses: actions/cache@v4
        with:
          path: facefusion-master/.assets
          key: facefusion-models-3.6.1-v2

      - name: Build DMG
        run: |
          chmod +x launcher/build.sh
          bash launcher/build.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: FaceFusion4.8-macOS-arm64
          path: build/FaceFusion4.8-macOS-arm64.dmg
          retention-days: 30

      - name: Upload to Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/FaceFusion4.8-macOS-arm64.dmg \
            --title "FaceFusion4.8 黄金定制版 $GITHUB_REF_NAME" \
            --notes "FaceFusion4.8 黄金定制版 macOS DMG 整合包"
        env:
          GH_TOKEN: ${{ github.token }}
