name: "Build FaceFusion4.8 DMG"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-dmg:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Free disk space (remove preinstalled bloat)
        run: |
          echo "=== 清理前 ==="
          df -h /
          # 删除 GitHub Actions macOS runner 预装的无用工具，释放 ~20-30GB
          sudo rm -rf /Applications/Xcode*.app 2>/dev/null || true
          sudo rm -rf /Library/Developer/CommandLineTools 2>/dev/null || true
          rm -rf ~/Library/Android 2>/dev/null || true
          rm -rf /usr/local/share/ios 2>/dev/null || true
          rm -rf /usr/local/lib/android 2>/dev/null || true
          # 删除 .NET, Haskell, Ruby, PHP, Mono 等
          rm -rf /usr/local/.ghcup 2>/dev/null || true
          rm -rf /Users/runner/.dotnet 2>/dev/null || true
          rm -rf /Users/runner/.cargo 2>/dev/null || true
          rm -rf /usr/local/opt/php* 2>/dev/null || true
          rm -rf /usr/local/opt/ruby* 2>/dev/null || true
          rm -rf /usr/local/opt/mono* 2>/dev/null || true
          rm -rf /usr/local/share/dotnet 2>/dev/null || true
          rm -rf /opt/hostedtoolcache 2>/dev/null || true
          # 清理 Homebrew 缓存
          brew cleanup --prune=all 2>/dev/null || true
          rm -rf "$(brew --cache)" 2>/dev/null || true
          echo "=== 清理后 ==="
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Homebrew
        run: |
          brew install create-dmg ffmpeg curl python-tk@3.12 2>/dev/null || true

      - name: Cache FaceFusion models
        uses: actions/cache@v4
        with:
          path: facefusion-master/.assets
          key: facefusion-models-3.6.1-v3
          restore-keys: |
            facefusion-models-3.6.1-

      - name: Build DMG
        run: |
          chmod +x launcher/build.sh
          bash launcher/build.sh
        env:
          SETUP_PYTHON_PATH: ${{ env.pythonLocation }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: FaceFusion4.8-macOS-arm64
          path: build/FaceFusion4.8-macOS-arm64.*
          retention-days: 30

      - name: Upload to Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          DMG_FILE="$(ls build/FaceFusion4.8-macOS-arm64.* 2>/dev/null | head -1)"
          gh release create "$GITHUB_REF_NAME" \
            "$DMG_FILE" \
            --title "FaceFusion4.8 黄金定制版 $GITHUB_REF_NAME" \
            --notes "FaceFusion4.8 黄金定制版 macOS DMG 整合包"
        env:
          GH_TOKEN: ${{ github.token }}
